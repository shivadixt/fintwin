events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        set $account_service account-service:8001;
        set $transaction_service transaction-service:8002;
        set $twin_service twin-service:8003;
        set $risk_service risk-service:8004;
        set $portfolio_service portfolio-service:8005;
        set $notification_service notification-service:8006;

        location /api/auth/ {
            rewrite ^/api/auth/(.*) /auth/$1 break;
            proxy_pass http://$account_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/accounts/ {
            rewrite ^/api/accounts/(.*) /accounts/$1 break;
            proxy_pass http://$account_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/transactions/ {
            rewrite ^/api/transactions/(.*) /transactions/$1 break;
            proxy_pass http://$transaction_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/simulate/ {
            rewrite ^/api/simulate/(.*) /simulate/$1 break;
            proxy_pass http://$twin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/risk/ {
            rewrite ^/api/risk/(.*) /risk/$1 break;
            proxy_pass http://$risk_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/portfolio/ {
            rewrite ^/api/portfolio/(.*) /portfolio/$1 break;
            proxy_pass http://$portfolio_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/notifications/ {
            rewrite ^/api/notifications/(.*) /notifications/$1 break;
            proxy_pass http://$notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
