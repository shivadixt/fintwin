services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fintwin
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  auth-service:
    build: ./services/auth-service
    ports:
      - "8007:8007"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintwin
      JWT_SECRET: ${JWT_SECRET:-fintwin-super-secret-key-2024}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  transaction-service:
    build: ./services/transaction-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintwin
      JWT_SECRET: ${JWT_SECRET:-fintwin-super-secret-key-2024}
      NOTIFICATION_SERVICE_URL: http://notification-service:8006
      INTERNAL_KEY: fintwin-internal-2024
    depends_on:
      db:
        condition: service_healthy

  twin-service:
    build: ./services/twin-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintwin
      JWT_SECRET: ${JWT_SECRET:-fintwin-super-secret-key-2024}
      NOTIFICATION_SERVICE_URL: http://notification-service:8006
      INTERNAL_KEY: fintwin-internal-2024
    depends_on:
      db:
        condition: service_healthy

  risk-service:
    build: ./services/risk-service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintwin
      JWT_SECRET: ${JWT_SECRET:-fintwin-super-secret-key-2024}
      NOTIFICATION_SERVICE_URL: http://notification-service:8006
      INTERNAL_KEY: fintwin-internal-2024
    depends_on:
      db:
        condition: service_healthy

  portfolio-service:
    build: ./services/portfolio-service
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintwin
      JWT_SECRET: ${JWT_SECRET:-fintwin-super-secret-key-2024}
      INTERNAL_KEY: fintwin-internal-2024
    depends_on:
      db:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintwin
      JWT_SECRET: ${JWT_SECRET:-fintwin-super-secret-key-2024}
      INTERNAL_KEY: fintwin-internal-2024
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - transaction-service
      - twin-service
      - risk-service
      - portfolio-service
      - notification-service

volumes:
  pgdata:
