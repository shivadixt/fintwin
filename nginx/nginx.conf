events {
    worker_connections 1024;
}

http {
    upstream account_service {
        server account-service:8001;
    }

    upstream transaction_service {
        server transaction-service:8002;
    }

    upstream twin_service {
        server twin-service:8003;
    }

    upstream risk_service {
        server risk-service:8004;
    }

    upstream portfolio_service {
        server portfolio-service:8005;
    }

    upstream notification_service {
        server notification-service:8006;
    }

    server {
        listen 80;

        location /api/auth/ {
            proxy_pass http://account_service/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/accounts/ {
            proxy_pass http://account_service/accounts/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/transactions/ {
            proxy_pass http://transaction_service/transactions/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/simulate/ {
            proxy_pass http://twin_service/simulate/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/risk/ {
            proxy_pass http://risk_service/risk/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/portfolio/ {
            proxy_pass http://portfolio_service/portfolio/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/notifications/ {
            proxy_pass http://notification_service/notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
